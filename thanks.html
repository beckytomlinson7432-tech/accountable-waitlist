<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="refresh" content="3;url=/" />
<title>You're on the list! — Accountable.</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #f0ede6; font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px; }
  .icon { font-size: 64px; margin-bottom: 24px; animation: pop 0.5s ease; }
  @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
  h1 { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; letter-spacing: -1px; margin-bottom: 12px; }
  h1 span { color: #b8f55a; }
  p { font-size: 16px; color: #888; line-height: 1.6; max-width: 400px; margin: 0 auto 12px; }
  .redirect { font-size: 13px; color: #555; margin-top: 24px; }
</style>
</head>
<body>
  <div>
    <div class="icon">🎉</div>
    <h1>You're on the <span>list!</span></h1>
    <p>We'll be in touch with your early access invite when Accountable launches. You're going to love it.</p>
    <p class="redirect">Taking you back in 3 seconds...</p>
  </div>
</body>
</html>
